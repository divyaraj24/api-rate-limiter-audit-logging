server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-tool
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

ratelimit:
  tiers:
    free:
      capacity: ${RATE_LIMIT_FREE_CAPACITY:30}
      refill-tokens: ${RATE_LIMIT_FREE_REFILL_TOKENS:30}
      refill-seconds: ${RATE_LIMIT_FREE_REFILL_SECONDS:60}
    premium:
      capacity: ${RATE_LIMIT_PREMIUM_CAPACITY:120}
      refill-tokens: ${RATE_LIMIT_PREMIUM_REFILL_TOKENS:120}
      refill-seconds: ${RATE_LIMIT_PREMIUM_REFILL_SECONDS:60}

audit:
  file-path: ${AUDIT_LOG_FILE:./logs/audit.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info
